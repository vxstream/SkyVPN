name: Update VPN Subscription

on:
  schedule:
    # Каждые 30 минут
    - cron: "*/30 * * * *"
  workflow_dispatch:  # ручной запуск из интерфейса GitHub

jobs:
  update-sub:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: write   # нужно для git push

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run checker
        run: python checker.py

      - name: Commit & push sub.txt
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sub.txt
          # Коммит только если файл изменился
          git diff --cached --quiet || git commit -m "chore: update sub.txt [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
